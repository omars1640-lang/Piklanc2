<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <style id="theme-bootstrap">html{background:#f8f9fd}html[data-theme="dark"]{background:#121218}</style>
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme === "dark" ? "dark" : "light");
        document.documentElement.style.colorScheme = savedTheme === "dark" ? "dark" : "light";
      } catch (error) {}
    })();
  </script>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الصفحة غير موجودة | PikLance</title><meta name="robots" content="noindex">
  <link rel="icon" href="/assets/brand/logo-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css">
  <link rel="stylesheet" href="/css/system-pages.css">
</head>
<body class="system-page error-page">
  <div class="system-scene" aria-hidden="true"><i class="system-orb one"></i><i class="system-orb two"></i></div>
  <main class="system-card">
    <div class="system-logo">
      <img class="piklance-brand-logo light-logo" src="/assets/brand/logo-light.svg" alt="PikLance">
      <img class="piklance-brand-logo dark-logo" src="/assets/brand/logo-dark.svg" alt="PikLance">
    </div>
    <div class="error-number" aria-label="404"><i>4</i><i>0</i><i>4</i></div>
    <h1 class="system-title">يبدو أن هذه الصفحة غادرت المكان</h1>
    <p class="system-copy">قد يكون الرابط محذوفاً أو تغيّر عنوانه. يمكنك العودة للرئيسية أو البحث بين الخدمات المتاحة.</p>
    <div class="system-actions"><a class="system-action primary" href="/index.html">العودة للرئيسية</a><a class="system-action" href="/services.html">تصفح الخدمات</a></div>
  </main>
  <script src="/js/latin-digits.js"></script><script type="module" src="/js/platform-guard.js"></script>
</body>
</html>
