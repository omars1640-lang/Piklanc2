<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نعود قريباً | PikLance</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="assets/brand/logo-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/system-pages.css">
</head>
<body class="system-page maintenance-page">
  <div class="system-scene" aria-hidden="true"><i class="system-orb one"></i><i class="system-orb two"></i></div>
  <main class="system-card">
    <img class="system-logo piklance-brand-logo force-dark" src="assets/brand/logo-dark.svg" alt="PikLance">
    <div class="maintenance-machine" aria-hidden="true"><span class="maintenance-pulse"></span><span class="maintenance-gear">⚙</span></div>
    <h1 class="system-title">نرتّب التفاصيل <span>لنعود أفضل</span></h1>
    <p class="system-copy">المنصة في صيانة قصيرة لتحسين التجربة. فريقنا يعمل الآن، وستعود جميع الخدمات تلقائياً فور انتهاء العمل.</p>
    <div class="maintenance-status"><span class="maintenance-dot"></span><span id="maintenanceStatus">الصيانة قيد التنفيذ</span></div>
    <div class="system-actions"><a class="system-action primary" href="login.html?returnUrl=dashboard.html">دخول الإدارة</a><a class="system-action" href="mailto:info@piklance.com">تواصل معنا</a></div>
    <div class="system-foot">© 2026 PikLance · شكراً لصبرك</div>
  </main>
  <script type="module">
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./js/firebase.js";
    const params=new URLSearchParams(location.search);const requested=params.get("returnUrl")||"";const target=requested.startsWith("/")&&!requested.startsWith("//")?requested:"/index.html";
    async function check(){try{const snap=await getDoc(doc(db,"platformSettings","general"));if(!snap.exists()||snap.data().maintenanceMode!==true)location.replace(target);}catch{document.getElementById("maintenanceStatus").textContent="نعمل على استعادة المنصة";}}
    check();setInterval(check,30000);
  </script>
  <script type="module" src="js/cookie-consent.js"></script>
</body>
</html>
