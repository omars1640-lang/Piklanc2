name: Repository safety

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Validate HTML and local references
        run: node scripts/validate-project.mjs

      - name: Run security regression audit
        run: node scripts/security-audit.mjs

      - name: Check browser JavaScript syntax
        shell: bash
        run: |
          find js -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Check Functions syntax
        working-directory: functions
        run: npm run check

      - name: Run Functions and scalability tests
        working-directory: functions
        run: npm test

      - name: Audit production dependencies
        working-directory: functions
        run: npm audit --omit=dev --audit-level=moderate

      - name: Check whitespace errors
        run: git diff --check HEAD~1 HEAD
