<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نعود قريباً | PikLance</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="assets/brand/logo-icon.svg">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;font-family:"Cairo",Tahoma,sans-serif;color:#f8f7ff;background:#100d25}.scene{position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(127,101,255,.3),transparent 32%),radial-gradient(circle at 80% 75%,rgba(32,208,174,.2),transparent 34%),linear-gradient(145deg,#0d0a20,#18113a 60%,#0e1c2c)}.grid{position:absolute;inset:0;opacity:.12;background-image:linear-gradient(rgba(255,255,255,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.12) 1px,transparent 1px);background-size:52px 52px;mask-image:linear-gradient(to bottom,transparent,#000,transparent);animation:drift 16s linear infinite}.orb{position:absolute;border-radius:50%;filter:blur(2px);animation:float 7s ease-in-out infinite}.orb.one{width:210px;height:210px;left:7%;top:13%;background:rgba(122,94,255,.17)}.orb.two{width:150px;height:150px;right:9%;bottom:12%;background:rgba(42,218,182,.14);animation-delay:-3s}.card{position:relative;width:min(92vw,720px);padding:clamp(30px,6vw,64px);text-align:center;border:1px solid rgba(255,255,255,.14);border-radius:32px;background:rgba(18,14,43,.72);box-shadow:0 32px 90px rgba(0,0,0,.4);backdrop-filter:blur(18px)}.logo{width:165px;max-width:48%;margin-bottom:26px}.machine{width:118px;height:118px;margin:0 auto 26px;position:relative;display:grid;place-items:center;border-radius:34px;background:linear-gradient(145deg,rgba(133,105,255,.24),rgba(43,207,177,.14));border:1px solid rgba(255,255,255,.14)}.gear{font-size:58px;animation:spin 7s linear infinite}.pulse{position:absolute;inset:-10px;border:1px solid rgba(143,119,255,.46);border-radius:40px;animation:pulse 2.2s ease-out infinite}h1{margin:0 0 12px;font-size:clamp(30px,5vw,52px);line-height:1.3}h1 span{color:#8f7cff}p{max-width:560px;margin:0 auto;color:#c7c2df;font-size:clamp(15px,2.4vw,19px);line-height:2}.status{margin:28px auto 0;display:inline-flex;align-items:center;gap:10px;padding:10px 17px;border-radius:999px;color:#d9fff5;background:rgba(36,201,166,.12);border:1px solid rgba(36,201,166,.28);font-size:14px}.dot{width:9px;height:9px;border-radius:50%;background:#35d8b6;box-shadow:0 0 0 0 rgba(53,216,182,.5);animation:dot 1.7s infinite}.actions{margin-top:24px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.actions a{padding:11px 18px;border:1px solid rgba(255,255,255,.16);border-radius:12px;color:#e9e6ff;text-decoration:none;background:rgba(255,255,255,.06);transition:.2s}.actions a:hover{transform:translateY(-2px);border-color:#8f7cff}.foot{margin-top:27px;color:#77708f;font-size:12px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%{transform:scale(.9);opacity:0}40%{opacity:1}100%{transform:scale(1.14);opacity:0}}@keyframes float{50%{transform:translateY(-18px) translateX(8px)}}@keyframes drift{to{background-position:52px 52px}}@keyframes dot{70%{box-shadow:0 0 0 9px rgba(53,216,182,0)}}@media(max-width:520px){.card{border-radius:24px;padding:34px 20px}.machine{width:96px;height:96px}.gear{font-size:48px}}
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true"><div class="grid"></div><i class="orb one"></i><i class="orb two"></i></div>
  <main class="card">
    <img class="logo" src="assets/brand/logo-light.svg" alt="PikLance">
    <div class="machine" aria-hidden="true"><span class="pulse"></span><span class="gear">⚙</span></div>
    <h1>نرتّب التفاصيل <span>لنعود أفضل</span></h1>
    <p>المنصة في صيانة قصيرة لتحسين التجربة. فريقنا يعمل الآن، وستعود جميع الخدمات تلقائياً فور انتهاء العمل.</p>
    <div class="status"><span class="dot"></span><span id="maintenanceStatus">الصيانة قيد التنفيذ</span></div>
    <div class="actions"><a href="login.html?returnUrl=dashboard.html">دخول الإدارة</a><a href="mailto:info@piklance.com">تواصل معنا</a></div>
    <div class="foot">© 2026 PikLance · شكراً لصبرك</div>
  </main>
  <script type="module">
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./js/firebase.js";
    const params=new URLSearchParams(location.search);const requested=params.get("returnUrl")||"";const target=requested.startsWith("/")&&!requested.startsWith("//")?requested:"/index.html";
    async function check(){try{const snap=await getDoc(doc(db,"platformSettings","general"));if(!snap.exists()||snap.data().maintenanceMode!==true)location.replace(target);}catch{document.getElementById("maintenanceStatus").textContent="نعمل على استعادة المنصة";}}
    check();setInterval(check,30000);
  </script>
</body>
</html>
