<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | PikLance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at 15% 15%, rgba(108,92,231,.14), transparent 32%), #f7f8fc;
      color: #1e1e2d;
      font-family: "Cairo", sans-serif;
    }
    button, input { font-family: inherit; }
    .login-box {
      width: min(460px, 100%);
      margin: auto 0;
      padding: 42px;
      border: 1px solid #eceaf2;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 18px 55px rgba(35, 27, 65, .09);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
      color: inherit;
      text-decoration: none;
      font-size: 24px;
      font-weight: 800;
    }
    .logo-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 13px;
      color: #fff;
      background: linear-gradient(135deg, #6c5ce7, #9386f1);
    }
    .logo em { color: #6c5ce7; font-style: normal; }
    h1 { margin: 0; text-align: center; font-size: 25px; }
    .intro { margin: 7px 0 26px; color: #777484; text-align: center; font-size: 13px; }
    .form-group { margin-bottom: 17px; }
    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 7px;
    }
    label { display: block; font-size: 13px; font-weight: 700; }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #ddd9e7;
      border-radius: 11px;
      background: #fbfafd;
      font-size: 14px;
      transition: .2s;
    }
    input:focus {
      outline: none;
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108,92,231,.1);
    }
    .forgot-password {
      border: 0;
      padding: 0;
      background: transparent;
      color: #6c5ce7;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-button, .secondary-button {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 11px;
      color: #fff;
      background: #6c5ce7;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary-button:hover { background: #5949cf; }
    .secondary-button {
      color: #3c3748;
      background: #fff;
      border: 1px solid #ddd9e7;
    }
    button:disabled { opacity: .65; cursor: wait; }
    .login-message, .reset-message {
      display: none;
      margin: 14px 0 0;
      padding: 11px 13px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.8;
    }
    .login-message.show, .reset-message.show { display: block; }
    .success { color: #0b7048; background: #e5f8ef; }
    .error { color: #a52c43; background: #fdecef; }
    .info { color: #5c4689; background: #f0ebfb; }
    .links { margin-top: 20px; text-align: center; font-size: 12px; }
    .links a { color: #6c5ce7; text-decoration: none; font-weight: 700; }
    .back-link {
      display: block;
      margin-top: 13px;
      color: #777484;
      text-align: center;
      text-decoration: none;
      font-size: 11px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(24, 17, 42, .68);
    }
    .modal-overlay.open { display: grid; }
    .reset-dialog {
      width: min(460px, 100%);
      padding: 28px;
      border-radius: 19px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0,0,0,.24);
    }
    .reset-dialog header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .reset-dialog h2 { margin: 0 0 5px; font-size: 20px; }
    .reset-dialog header p { margin: 0; color: #777484; font-size: 11px; line-height: 1.8; }
    .modal-close {
      border: 0;
      background: transparent;
      color: #777484;
      font-size: 24px;
      cursor: pointer;
    }
    .reset-actions { display: flex; gap: 10px; margin-top: 17px; }
    .piklance-global-footer { flex: 0 0 auto; }
    @media (max-width: 520px) {
      body { padding: 16px; }
      .login-box { padding: 30px 20px; }
      .reset-dialog { padding: 23px 19px; }
      .reset-actions { flex-direction: column-reverse; }
    }
  </style>
</head>
<body>
  <main class="login-box">
    <a class="logo" href="index.html">
      <span class="logo-mark">P</span>
      <span>Pik<em>Lance</em></span>
    </a>
    <h1>تسجيل الدخول</h1>
    <p class="intro">أدخل بيانات حسابك للعودة إلى مساحة عملك.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <div class="label-row">
          <label for="loginPassword">كلمة المرور</label>
          <button class="forgot-password" id="forgotPasswordButton" type="button">نسيت كلمة المرور؟</button>
        </div>
        <input type="password" id="loginPassword" placeholder="********" autocomplete="current-password" required>
      </div>
      <button class="primary-button" id="loginButton" type="submit">دخول</button>
      <div class="login-message" id="loginMessage" role="status"></div>
    </form>

    <div class="links"><a href="register.html">ليس لديك حساب؟ انضم مجاناً</a></div>
    <a href="index.html" class="back-link">← العودة للرئيسية</a>
  </main>

  <div class="modal-overlay" id="resetPasswordModal" aria-hidden="true">
    <form class="reset-dialog" id="resetPasswordForm">
      <header>
        <div>
          <h2>إعادة تعيين كلمة المرور</h2>
          <p>أدخل بريد حسابك وسنرسل رابطاً آمناً لاختيار كلمة مرور جديدة.</p>
        </div>
        <button class="modal-close" type="button" data-close-reset aria-label="إغلاق">×</button>
      </header>
      <div class="form-group">
        <label for="resetEmail">البريد الإلكتروني</label>
        <input type="email" id="resetEmail" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="reset-message" id="resetMessage" role="status"></div>
      <div class="reset-actions">
        <button class="secondary-button" type="button" data-close-reset>إلغاء</button>
        <button class="primary-button" id="sendResetButton" type="submit">إرسال رابط الاستعادة</button>
      </div>
    </form>
  </div>

  <script type="module">
    import {
      browserLocalPersistence,
      indexedDBLocalPersistence,
      sendEmailVerification,
      sendPasswordResetEmail,
      setPersistence,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { auth, db } from "./js/firebase.js";

    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");
    const loginMessage = document.getElementById("loginMessage");
    const resetModal = document.getElementById("resetPasswordModal");
    const resetForm = document.getElementById("resetPasswordForm");
    const resetEmail = document.getElementById("resetEmail");
    const resetMessage = document.getElementById("resetMessage");
    const sendResetButton = document.getElementById("sendResetButton");
    let resetCooldown = false;

    async function ensureLocalPersistence() {
      try {
        await setPersistence(auth, indexedDBLocalPersistence);
      } catch {
        await setPersistence(auth, browserLocalPersistence);
      }
    }

    function safeReturnUrl() {
      const requested = new URLSearchParams(location.search).get("returnUrl");
      if (!requested) return "index.html";
      try {
        const target = new URL(requested, location.href);
        if (target.origin !== location.origin || !target.pathname.endsWith(".html")) return "index.html";
        return `${target.pathname.split("/").pop()}${target.search}${target.hash}`;
      } catch {
        return "index.html";
      }
    }

    function loginDestination(profile) {
      const returnUrl = safeReturnUrl();
      if (returnUrl !== "index.html") return returnUrl;
      return profile.role === "admin" ? "dashboard.html" : "index.html";
    }

    function showMessage(element, message, type) {
      element.textContent = message;
      element.className = `${element === loginMessage ? "login-message" : "reset-message"} show ${type}`;
    }

    function openResetModal() {
      resetEmail.value = document.getElementById("loginEmail").value.trim();
      resetMessage.className = "reset-message";
      resetMessage.textContent = "";
      resetModal.classList.add("open");
      resetModal.setAttribute("aria-hidden", "false");
      setTimeout(() => resetEmail.focus(), 50);
    }

    function closeResetModal() {
      resetModal.classList.remove("open");
      resetModal.setAttribute("aria-hidden", "true");
    }

    function completeResetRequest(email) {
      resetCooldown = true;
      document.getElementById("loginEmail").value = email;
      closeResetModal();
      showMessage(loginMessage, "تم إرسال رابط استعادة كلمة المرور. تحقق من بريدك الإلكتروني ومجلد الرسائل غير المرغوب فيها.", "success");
      setTimeout(() => {
        resetCooldown = false;
        sendResetButton.disabled = false;
        sendResetButton.textContent = "إعادة إرسال الرابط";
      }, 60000);
    }

    document.getElementById("forgotPasswordButton").addEventListener("click", openResetModal);
    document.querySelectorAll("[data-close-reset]").forEach(button => button.addEventListener("click", closeResetModal));
    resetModal.addEventListener("click", event => {
      if (event.target === resetModal) closeResetModal();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeResetModal();
    });

    resetForm.addEventListener("submit", async event => {
      event.preventDefault();
      const email = resetEmail.value.trim().toLowerCase();
      if (!email || resetCooldown) return;

      sendResetButton.disabled = true;
      sendResetButton.textContent = "جاري الإرسال...";
      resetMessage.className = "reset-message";

      try {
        auth.languageCode = "ar";
        await sendPasswordResetEmail(auth, email);
        completeResetRequest(email);
      } catch (error) {
        console.error("Password reset email failed", error);
        if (error.code === "auth/user-not-found") {
          completeResetRequest(email);
          return;
        }
        const messages = {
          "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة.",
          "auth/too-many-requests": "تم إرسال عدة طلبات. انتظر قليلاً ثم حاول مجدداً.",
          "auth/network-request-failed": "تعذر الاتصال بالإنترنت. تحقق من الشبكة وحاول مجدداً."
        };
        showMessage(resetMessage, messages[error.code] || "تعذر إرسال رابط الاستعادة حالياً. حاول مجدداً بعد قليل.", "error");
        sendResetButton.disabled = false;
        sendResetButton.textContent = "إرسال رابط الاستعادة";
      }
    });

    loginForm.addEventListener("submit", async event => {
      event.preventDefault();
      const email = document.getElementById("loginEmail").value.trim().toLowerCase();
      const password = document.getElementById("loginPassword").value;
      loginButton.disabled = true;
      loginButton.textContent = "جاري الدخول...";
      loginMessage.className = "login-message";

      try {
        await ensureLocalPersistence();
        const credential = await signInWithEmailAndPassword(auth, email, password);
        const userSnapshot = await getDoc(doc(db, "users", credential.user.uid));

        if (!userSnapshot.exists()) {
          await signOut(auth);
          showMessage(loginMessage, "بيانات الحساب غير مكتملة. تواصل مع الدعم.", "error");
          return;
        }

        const profile = userSnapshot.data();
        if (!credential.user.emailVerified) {
          try {
            auth.languageCode = "ar";
            await sendEmailVerification(credential.user);
          } catch (error) {
            console.error("Verification email failed", error);
          }
          await signOut(auth);
          showMessage(loginMessage, "يجب تفعيل البريد الإلكتروني قبل الدخول. أرسلنا رسالة تحقق جديدة إن أمكن.", "info");
          return;
        }

        if (profile.status === "pending") {
          await signOut(auth);
          location.href = "pending-review.html";
          return;
        }
        if (profile.status === "rejected") {
          if (profile.accountType === "freelancer") {
            sessionStorage.setItem("freelancerRejectionReason", profile.rejectionReason || "");
            showMessage(loginMessage, `تم رفض الطلب: ${profile.rejectionReason || "راجع بيانات التوثيق"}. سيتم تحويلك لإعادة تقديم الطلب.`, "info");
            setTimeout(() => {
              location.href = "register.html?resubmit=1";
            }, 900);
            return;
          }
          await signOut(auth);
          showMessage(loginMessage, `تم رفض الحساب: ${profile.rejectionReason || "راجع دعم المنصة"}`, "error");
          return;
        }
        if (profile.status === "suspended") {
          await signOut(auth);
          showMessage(loginMessage, `الحساب موقوف مؤقتاً: ${profile.suspensionReason || "راجع دعم المنصة"}`, "error");
          return;
        }

        location.href = loginDestination(profile);
      } catch (error) {
        console.error("Login failed", error);
        const messages = {
          "auth/invalid-credential": "البريد الإلكتروني أو كلمة المرور غير صحيحة.",
          "auth/invalid-email": "صيغة البريد الإلكتروني غير صحيحة.",
          "auth/too-many-requests": "محاولات كثيرة. انتظر قليلاً ثم حاول مجدداً.",
          "auth/network-request-failed": "تعذر الاتصال بالإنترنت."
        };
        showMessage(loginMessage, messages[error.code] || "تعذر تسجيل الدخول حالياً.", "error");
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "دخول";
      }
    });
  </script>
  <script type="module" src="js/footer-copy.js"></script>
</body>
</html>
