<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - PikLance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #F8F9FD;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .register-box {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem;
      width: 550px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 1.5rem; }
    .logo span { color: #6C5CE7; }
    h2 { text-align: center; margin-bottom: 1rem; }
    .type-selector { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .type-btn {
      flex: 1; padding: 1rem; border: 2px solid #E2E8F0; border-radius: 12px;
      text-align: center; cursor: pointer; background: #fff;
      font-family: 'Cairo', sans-serif; font-weight: 600; transition: 0.3s;
    }
    .type-btn.active { border-color: #6C5CE7; background: #F3F0FF; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
    input, select {
      width: 100%; padding: 0.7rem; border: 1px solid #ddd;
      border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 1rem;
    }
    input:focus, select:focus { outline: none; border-color: #6C5CE7; }
    .btn {
      width: 100%; padding: 0.8rem; background: #6C5CE7; color: #fff;
      border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; font-family: 'Cairo', sans-serif; margin-top: 1rem;
    }
    .btn:hover { background: #5A4BD1; }
    .btn-outline { background: #fff; color: #6C5CE7; border: 2px solid #6C5CE7; }
    .back-link { display: block; text-align: center; margin-top: 1rem; color: #636E72; text-decoration: none; }
    .hidden { display: none; }
    .alert {
      padding: 0.8rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem;
    }
    .alert-info { background: #E3F2FD; border-right: 4px solid #6C5CE7; }
    .alert-warning { background: #FFF3CD; border-right: 4px solid #F59E0B; }
    .step-indicator {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .step-dot {
      width: 30px; height: 30px; border-radius: 50%; background: #E2E8F0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; color: #636E72;
    }
    .step-dot.active { background: #6C5CE7; color: #fff; }
    .step-dot.done { background: #10B981; color: #fff; }
    .step-line { flex: 1; height: 2px; background: #E2E8F0; }
    .step-line.done { background: #10B981; }
    .id-upload {
      border: 2px dashed #ddd; border-radius: 12px; padding: 1.5rem;
      text-align: center; cursor: pointer; margin-bottom: 0.5rem;
    }
    .id-upload img { max-height: 150px; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="register-box">
    <div class="logo">Pik<span>Lance</span></div>
    <h2>إنشاء حساب جديد</h2>

    <div id="typeSelection">
      <div class="type-selector">
        <button class="type-btn active" onclick="selectType('buyer')">🛍️ عميل</button>
        <button class="type-btn" onclick="selectType('freelancer')">🎨 مستقل</button>
      </div>
    </div>

    <div id="buyerForm">
      <div class="alert alert-info">⚡ تفعيل فوري</div>
      <div class="form-group"><label>الاسم الكامل</label><input type="text" id="buyerName"></div>
      <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="buyerEmail"></div>
      <div class="form-group"><label>كلمة المرور</label><input type="password" id="buyerPassword"></div>
      <button class="btn" onclick="registerBuyer()">إنشاء حساب</button>
    </div>

    <div id="freelancerForm" class="hidden">
      <div class="step-indicator">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line1"></div>
        <div class="step-dot" id="dot2">2</div>
        <div class="step-line" id="line2"></div>
        <div class="step-dot" id="dot3">3</div>
      </div>
      <div id="fstep1">
        <h3>الخطوة 1: المعلومات الأساسية</h3>
        <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fName"></div>
        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="fEmail"></div>
        <div class="form-group"><label>رقم الهاتف</label><input type="text" id="fPhone"></div>
        <div class="form-group"><label>التخصص</label><select id="fSpecialty"><option value="">اختر</option><option value="design">تصميم</option><option value="web">برمجة</option><option value="writing">كتابة</option><option value="marketing">تسويق</option></select></div>
        <div class="form-group"><label>كلمة المرور</label><input type="password" id="fPassword"></div>
        <button class="btn" onclick="freelancerNext(2)">التالي</button>
      </div>
      <div id="fstep2" class="hidden">
        <h3>الخطوة 2: توثيق الهوية</h3>
        <div class="alert alert-warning">🔒 مطلوب للموافقة على حسابك</div>
        <div class="form-group"><label>رقم الهوية</label><input type="text" id="fIdNumber"></div>
        <div class="form-group"><label>الاسم في الهوية</label><input type="text" id="fIdName"></div>
        <div class="form-group">
          <label>صورة الوجه الأمامي</label>
          <div class="id-upload" onclick="document.getElementById('frontImg').click()">
            📷 اضغط لرفع الصورة
            <input type="file" id="frontImg" accept="image/*" style="display:none;" onchange="preview(this, 'frontPreview')">
            <img id="frontPreview">
          </div>
        </div>
        <div class="form-group">
          <label>صورة الوجه الخلفي</label>
          <div class="id-upload" onclick="document.getElementById('backImg').click()">
            📷 اضغط لرفع الصورة
            <input type="file" id="backImg" accept="image/*" style="display:none;" onchange="preview(this, 'backPreview')">
            <img id="backPreview">
          </div>
        </div>
        <div style="display:flex; gap:1rem;">
          <button class="btn btn-outline" onclick="freelancerNext(1)">السابق</button>
          <button class="btn" onclick="freelancerNext(3)">التالي</button>
        </div>
      </div>
      <div id="fstep3" class="hidden">
        <h3>الخطوة 3: مراجعة وتقديم</h3>
        <div class="alert alert-info">📧 سيتم مراجعة طلبك خلال 24 ساعة</div>
        <div id="summary"></div>
        <div style="display:flex; gap:1rem;">
          <button class="btn btn-outline" onclick="freelancerNext(2)">السابق</button>
          <button class="btn" onclick="registerFreelancer()">تقديم الطلب</button>
        </div>
      </div>
    </div>

    <a href="index.html" class="back-link">← العودة للرئيسية</a>
  </div>

  <script type="module">
    import { createUserWithEmailAndPassword, deleteUser, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { deleteObject, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
    import { auth, db, storage } from "./js/firebase.js";

    const MAX_ID_IMAGE_SIZE = 5 * 1024 * 1024;

    function validatePassword(password) {
      return password.length >= 8;
    }

    function validateImage(file) {
      return file && file.type.startsWith('image/') && file.size <= MAX_ID_IMAGE_SIZE;
    }

    async function createProfiles(uid, privateProfile, publicProfile) {
      const batch = writeBatch(db);
      batch.set(doc(db, "users", uid), privateProfile);
      batch.set(doc(db, "publicProfiles", uid), publicProfile);
      await batch.commit();
    }

    async function cleanupFailedRegistration(user, uploadedPaths = []) {
      await Promise.allSettled(uploadedPaths.map(path => deleteObject(ref(storage, path))));
      if (user) await deleteUser(user).catch(() => {});
    }

    window.selectType = function(type) {
      document.getElementById('buyerForm').classList.toggle('hidden', type !== 'buyer');
      document.getElementById('freelancerForm').classList.toggle('hidden', type !== 'freelancer');
      document.getElementById('typeSelection').classList.add('hidden');
    };

    window.registerBuyer = async function() {
      const name = document.getElementById('buyerName').value.trim();
      const email = document.getElementById('buyerEmail').value.trim();
      const password = document.getElementById('buyerPassword').value;
      if (!name || !email || !password) { alert('يرجى ملء جميع الحقول'); return; }
      if (!validatePassword(password)) { alert('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }
      let createdUser = null;
      let profilesCreated = false;
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        createdUser = userCredential.user;
        await createProfiles(userCredential.user.uid, {
          name,
          email,
          accountType: 'buyer',
          status: 'active',
          createdAt: serverTimestamp()
        }, {
          name,
          accountType: 'buyer'
        });
        profilesCreated = true;
        await sendEmailVerification(userCredential.user);
        await signOut(auth);
        alert('✅ تم إنشاء الحساب - تحقق من بريدك الإلكتروني');
        window.location.href = 'login.html';
      } catch (error) {
        if (!profilesCreated) await cleanupFailedRegistration(createdUser);
        else await signOut(auth).catch(() => {});
        alert(profilesCreated
          ? 'تم إنشاء الحساب، لكن تعذر إرسال رسالة التحقق. سجّل الدخول لاحقاً لإعادة إرسالها.'
          : '❌ ' + error.message);
      }
    };

    let freelancerStep = 1;
    window.freelancerNext = function(step) {
      freelancerStep = step;
      document.getElementById('fstep1').classList.toggle('hidden', step !== 1);
      document.getElementById('fstep2').classList.toggle('hidden', step !== 2);
      document.getElementById('fstep3').classList.toggle('hidden', step !== 3);
      
      document.getElementById('dot1').className = 'step-dot' + (step > 1 ? ' done' : ' active');
      document.getElementById('dot2').className = 'step-dot' + (step > 2 ? ' done' : step === 2 ? ' active' : '');
      document.getElementById('dot3').className = 'step-dot' + (step === 3 ? ' active' : '');
      document.getElementById('line1').className = 'step-line' + (step > 1 ? ' done' : '');
      document.getElementById('line2').className = 'step-line' + (step > 2 ? ' done' : '');

      if (step === 3) {
        const summary = document.getElementById('summary');
        summary.replaceChildren();
        [
          ['الاسم', document.getElementById('fName').value],
          ['البريد', document.getElementById('fEmail').value],
          ['التخصص', document.getElementById('fSpecialty').value]
        ].forEach(([label, value]) => {
          const row = document.createElement('p');
          const strong = document.createElement('strong');
          strong.textContent = label + ': ';
          row.append(strong, document.createTextNode(value));
          summary.appendChild(row);
        });
        const state = document.createElement('p');
        state.textContent = '⏳ في انتظار المراجعة';
        state.style.color = '#F59E0B';
        summary.appendChild(state);
      }
    };

    window.preview = function(input, previewId) {
      const file = input.files[0];
      if (file) {
        if (!validateImage(file)) {
          input.value = '';
          alert('اختر صورة صحيحة لا يتجاوز حجمها 5MB');
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById(previewId);
          img.src = e.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    };

    window.registerFreelancer = async function() {
  const name = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const password = document.getElementById('fPassword').value;
  const phone = document.getElementById('fPhone').value.trim();
  const specialty = document.getElementById('fSpecialty').value;
  const idNumber = document.getElementById('fIdNumber').value.trim();
  const idName = document.getElementById('fIdName').value.trim();
  const frontFile = document.getElementById('frontImg').files[0];
  const backFile = document.getElementById('backImg').files[0];

  if (!name || !email || !password || !phone || !specialty || !idNumber || !idName) {
    alert('يرجى ملء جميع الحقول');
    return;
  }
  if (!validatePassword(password)) { alert('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }
  if (!validateImage(frontFile) || !validateImage(backFile)) {
    alert('يجب رفع صورتي الهوية بصيغة صورة وبحجم لا يتجاوز 5MB');
    return;
  }

  let createdUser = null;
  let profilesCreated = false;
  const uploadedPaths = [];
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    createdUser = userCredential.user;
    const uid = userCredential.user.uid;
    const frontPath = `identity/${uid}/front`;
    const backPath = `identity/${uid}/back`;
    const uploadResults = await Promise.allSettled([
      uploadBytes(ref(storage, frontPath), frontFile, { contentType: frontFile.type })
        .then(() => uploadedPaths.push(frontPath)),
      uploadBytes(ref(storage, backPath), backFile, { contentType: backFile.type })
        .then(() => uploadedPaths.push(backPath))
    ]);
    const failedUpload = uploadResults.find(result => result.status === 'rejected');
    if (failedUpload) throw failedUpload.reason;

    await createProfiles(uid, {
      name, email,
      phone,
      specialty,
      idNumber,
      idName,
      idFrontPath: frontPath,
      idBackPath: backPath,
      accountType: 'freelancer',
      status: 'pending',
      createdAt: serverTimestamp()
    }, {
      name,
      accountType: 'freelancer'
    });
    profilesCreated = true;

    await sendEmailVerification(userCredential.user);
    await signOut(auth);
    alert('✅ تم تقديم الطلب - تحقق من بريدك الإلكتروني');
    window.location.href = 'login.html';
  } catch (error) {
    if (!profilesCreated) await cleanupFailedRegistration(createdUser, uploadedPaths);
    else await signOut(auth).catch(() => {});
    alert(profilesCreated
      ? 'تم تقديم الطلب، لكن تعذر إرسال رسالة التحقق. سجّل الدخول لاحقاً لإعادة إرسالها.'
      : '❌ ' + error.message);
  }
};
  </script>
</body>
</html>
